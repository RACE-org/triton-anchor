name: Local CI Bridge

on:
  push:
    branches: [jiwang-delivery-ci]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "single checks one commit; reconcile scans branch head and open PRs"
        required: false
        default: "single"
        type: choice
        options:
          - single
          - reconcile
      source_branch:
        description: "Gitee source branch to check or reconcile"
        required: false
        default: "jiwang-delivery-ci"
      commit_sha:
        description: "Commit SHA to check in single mode; defaults to the workflow commit"
        required: false
        default: ""

permissions:
  contents: read
  pull-requests: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  bridge:
    name: Publish Gitee Local CI Status
    runs-on: ubuntu-latest
    env:
      GITEE_RESULTS_OWNER: ${{ vars.GITEE_RESULTS_OWNER || vars.GITEE_OWNER || 'likehupochuan' }}
      GITEE_RESULTS_REPO: ${{ vars.GITEE_RESULTS_REPO || 'triton-anchor-local-ci-results' }}
      GITEE_RESULTS_BRANCH: ${{ vars.GITEE_RESULTS_BRANCH || 'local-ci-results' }}
      GITEE_RESULTS_WEB_URL: ${{ vars.GITEE_RESULTS_WEB_URL || 'https://gitee.com/likehupochuan/triton-anchor-local-ci-results' }}
      LOCAL_CI_CONTEXT: ${{ vars.LOCAL_CI_CONTEXT || 'local-ci/sophgo-cmodel' }}
      LOCAL_CI_RECONCILE_SOURCE_BRANCH: ${{ vars.LOCAL_CI_RECONCILE_SOURCE_BRANCH || 'jiwang-delivery-ci' }}
      LOCAL_CI_BRIDGE_MAX_PRS: ${{ vars.LOCAL_CI_BRIDGE_MAX_PRS || '100' }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - name: Check pull request source
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "::error::Local CI can only test PR branches that are mirrored into Gitee. Fork PRs are not supported by this runner."
          exit 1

      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check bridge script
        run: python -m py_compile scripts/local_ci/bridge_gitee_to_github_status.py

      - name: Sync Gitee result to GitHub status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRIDGE_MODE: ${{ github.event_name == 'schedule' && 'reconcile' || github.event.inputs.mode || 'single' }}
          BRIDGE_SOURCE_BRANCH: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.event.inputs.source_branch || github.ref_name }}
          BRIDGE_COMMIT_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.inputs.commit_sha || github.sha }}
        run: |
          if [ "${BRIDGE_MODE}" = "reconcile" ]; then
            python scripts/local_ci/bridge_gitee_to_github_status.py \
              --mode reconcile \
              --gitee-owner "${GITEE_RESULTS_OWNER}" \
              --gitee-repo "${GITEE_RESULTS_REPO}" \
              --gitee-results-branch "${GITEE_RESULTS_BRANCH}" \
              --gitee-web-url "${GITEE_RESULTS_WEB_URL}" \
              --source-branch "${LOCAL_CI_RECONCILE_SOURCE_BRANCH}" \
              --context "${LOCAL_CI_CONTEXT}" \
              --max-prs "${LOCAL_CI_BRIDGE_MAX_PRS}"
          else
            python scripts/local_ci/bridge_gitee_to_github_status.py \
              --mode single \
              --set-pending \
              --gitee-owner "${GITEE_RESULTS_OWNER}" \
              --gitee-repo "${GITEE_RESULTS_REPO}" \
              --gitee-results-branch "${GITEE_RESULTS_BRANCH}" \
              --gitee-web-url "${GITEE_RESULTS_WEB_URL}" \
              --source-branch "${BRIDGE_SOURCE_BRANCH}" \
              --sha "${BRIDGE_COMMIT_SHA}" \
              --context "${LOCAL_CI_CONTEXT}"
          fi
