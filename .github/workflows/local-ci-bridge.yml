name: Local CI Bridge

on:
  push:
    branches: [jiwang-delivery-ci]
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Gitee source branch to wait for"
        required: false
        default: "jiwang-delivery-ci"
      commit_sha:
        description: "Commit SHA to wait for; defaults to the workflow commit"
        required: false
        default: ""

permissions:
  contents: read
  statuses: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  bridge:
    name: Publish Gitee Local CI Status
    runs-on: ubuntu-latest
    env:
      GITEE_OWNER: ${{ vars.GITEE_OWNER || 'likehupochuan' }}
      GITEE_REPO: ${{ vars.GITEE_REPO || 'triton-anchor' }}
      GITEE_RESULTS_BRANCH: ${{ vars.GITEE_RESULTS_BRANCH || 'local-ci-results' }}
      GITEE_WEB_URL: ${{ vars.GITEE_WEB_URL || 'https://gitee.com/likehupochuan/triton-anchor' }}
      LOCAL_CI_CONTEXT: ${{ vars.LOCAL_CI_CONTEXT || 'local-ci/sophgo-cmodel' }}
      LOCAL_CI_BRIDGE_TIMEOUT_SECONDS: ${{ vars.LOCAL_CI_BRIDGE_TIMEOUT_SECONDS || '10800' }}
      LOCAL_CI_BRIDGE_POLL_INTERVAL_SECONDS: ${{ vars.LOCAL_CI_BRIDGE_POLL_INTERVAL_SECONDS || '60' }}
      GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check bridge script
        run: python -m py_compile scripts/local_ci/bridge_gitee_to_github_status.py

      - name: Wait for Gitee result and update GitHub status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          BRIDGE_SOURCE_BRANCH: ${{ github.event.inputs.source_branch || github.ref_name }}
          BRIDGE_COMMIT_SHA: ${{ github.event.inputs.commit_sha || github.sha }}
        run: |
          python scripts/local_ci/bridge_gitee_to_github_status.py \
            --gitee-owner "${GITEE_OWNER}" \
            --gitee-repo "${GITEE_REPO}" \
            --gitee-results-branch "${GITEE_RESULTS_BRANCH}" \
            --gitee-web-url "${GITEE_WEB_URL}" \
            --source-branch "${BRIDGE_SOURCE_BRANCH}" \
            --sha "${BRIDGE_COMMIT_SHA}" \
            --context "${LOCAL_CI_CONTEXT}" \
            --timeout-seconds "${LOCAL_CI_BRIDGE_TIMEOUT_SECONDS}" \
            --poll-interval-seconds "${LOCAL_CI_BRIDGE_POLL_INTERVAL_SECONDS}"
